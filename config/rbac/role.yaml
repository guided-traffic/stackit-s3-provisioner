---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: stackit-s3-provisioner-role
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - stackit-bucket.gtrfc.com
  resources:
  - buckets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - stackit-bucket.gtrfc.com
  resources:
  - buckets/finalizers
  verbs:
  - update
- apiGroups:
  - stackit-bucket.gtrfc.com
  resources:
  - buckets/status
  verbs:
  - get
  - patch
  - update
