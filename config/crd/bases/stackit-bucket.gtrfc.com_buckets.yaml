---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: buckets.stackit-bucket.gtrfc.com
spec:
  group: stackit-bucket.gtrfc.com
  names:
    kind: Bucket
    listKind: BucketList
    plural: buckets
    shortNames:
    - bkt
    singular: bucket
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Requested bucket name
      jsonPath: .spec.bucketName
      name: Bucket
      type: string
    - description: Coarse reconcile lifecycle state
      jsonPath: .status.phase
      name: Phase
      type: string
    - description: Whether the bucket is fully provisioned
      jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - description: Current provisioning step or short failure reason
      jsonPath: .status.message
      name: Status
      type: string
    - description: StackIT region
      jsonPath: .spec.region
      name: Region
      type: string
    - description: Clone transfer progress
      jsonPath: .status.clone.progress
      name: Clone
      priority: 1
      type: string
    - description: Physical bucket name in StackIT Object Storage
      jsonPath: .status.resolvedBucketName
      name: Resolved
      priority: 1
      type: string
    - description: Secret holding the workload credentials
      jsonPath: .spec.secretRef.name
      name: Secret
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          Bucket is the Schema for the buckets API. One Bucket maps to a StackIT bucket,
          a dedicated credentials group, an access key and an isolation policy.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              BucketSpec defines the desired state of a StackIT Object Storage bucket and its
              dedicated, isolated workload credentials (one CR = one isolated workload, see
              INIT-SETUP.md §8).
            properties:
              bucketName:
                description: |-
                  BucketName is the DNS-compliant name of the bucket in StackIT Object Storage.
                  It is immutable: changing it after creation is rejected.
                maxLength: 63
                minLength: 3
                pattern: ^[a-z0-9][a-z0-9.-]*[a-z0-9]$
                type: string
                x-kubernetes-validations:
                - message: bucketName is immutable
                  rule: self == oldSelf
              cloneFrom:
                description: |-
                  CloneFrom requests a one-shot copy of an existing S3 bucket's contents
                  into this bucket after provisioning. See CloneFrom for details; by default
                  the workload credentials Secret is only written once the copy succeeded.
                properties:
                  addressingStyle:
                    default: path
                    description: |-
                      AddressingStyle selects how the source bucket is addressed: "path"
                      (endpoint.host/bucket — the S3-compatible default, works for StackIT,
                      MinIO, Ceph, …) or "virtual-hosted" (bucket.endpoint.host — AWS's
                      preferred style). Defaults to path.
                    enum:
                    - path
                    - virtual-hosted
                    type: string
                  bucket:
                    description: Bucket is the name of the source bucket at the endpoint.
                    minLength: 1
                    type: string
                  endpoint:
                    description: |-
                      Endpoint is the S3 endpoint of the source bucket, as a bare host
                      (TLS assumed, e.g. object.storage.eu01.onstackit.cloud) or a
                      scheme-qualified URL.
                    minLength: 1
                    type: string
                  holdSecretUntilCloned:
                    default: true
                    description: |-
                      HoldSecretUntilCloned delays writing the workload credentials Secret until
                      the clone completed successfully, so consuming workloads never start
                      against a partially copied bucket. Disable to publish the credentials
                      immediately; the Ready condition still waits for the clone either way.
                    type: boolean
                  region:
                    description: |-
                      Region is the region of the source endpoint, when it requires one for
                      SigV4 signing (e.g. eu01 for StackIT, eu-central-1 for AWS).
                    type: string
                  secretRef:
                    description: |-
                      SecretRef selects the Secret (in the Bucket's namespace) holding the
                      credentials that can read the source bucket.
                    properties:
                      keys:
                        description: Keys overrides the data-key names the credentials
                          are read from.
                        properties:
                          accessKeyID:
                            description: |-
                              AccessKeyID overrides the key holding the source S3 access key id.
                              Defaults to AWS_ACCESS_KEY_ID.
                            pattern: ^[-._a-zA-Z0-9]+$
                            type: string
                          secretAccessKey:
                            description: |-
                              SecretAccessKey overrides the key holding the source S3 secret.
                              Defaults to AWS_SECRET_ACCESS_KEY.
                            pattern: ^[-._a-zA-Z0-9]+$
                            type: string
                        type: object
                      name:
                        description: |-
                          Name of the Secret (in the Bucket's namespace) holding the source
                          credentials.
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                required:
                - bucket
                - endpoint
                - secretRef
                type: object
              region:
                default: eu01
                description: Region is the StackIT region the bucket is provisioned
                  in.
                minLength: 1
                type: string
              secretRef:
                description: |-
                  SecretRef selects the Secret that receives the provisioned S3 access key and
                  secret. The operator writes accessKeyID and secretAccessKey into this Secret.
                properties:
                  keys:
                    description: |-
                      Keys overrides the data-key names written into the Secret. All fields are
                      optional and default to env-var-style names (see SecretKeys).
                    properties:
                      accessKeyID:
                        description: |-
                          AccessKeyID overrides the key holding the S3 access key id.
                          Defaults to AWS_ACCESS_KEY_ID.
                        pattern: ^[-._a-zA-Z0-9]+$
                        type: string
                      bucketName:
                        description: |-
                          BucketName overrides the key holding the bucket name.
                          Defaults to S3_BUCKET.
                        pattern: ^[-._a-zA-Z0-9]+$
                        type: string
                      bucketURL:
                        description: |-
                          BucketURL overrides the key holding the full path-style bucket URL.
                          Defaults to S3_BUCKET_URL.
                        pattern: ^[-._a-zA-Z0-9]+$
                        type: string
                      endpoint:
                        description: |-
                          Endpoint overrides the key holding the S3 endpoint host (no scheme).
                          Defaults to S3_ENDPOINT.
                        pattern: ^[-._a-zA-Z0-9]+$
                        type: string
                      region:
                        description: |-
                          Region overrides the key holding the StackIT region.
                          Defaults to S3_REGION.
                        pattern: ^[-._a-zA-Z0-9]+$
                        type: string
                      secretAccessKey:
                        description: |-
                          SecretAccessKey overrides the key holding the S3 secret.
                          Defaults to AWS_SECRET_ACCESS_KEY.
                        pattern: ^[-._a-zA-Z0-9]+$
                        type: string
                    type: object
                  name:
                    description: Name of the Secret to write the S3 credentials to.
                    minLength: 1
                    type: string
                  namespace:
                    description: Namespace of the Secret. Defaults to the Bucket's
                      own namespace when empty.
                    type: string
                required:
                - name
                type: object
              wipeOnDelete:
                description: |-
                  WipeOnDelete requests that the operator deletes ALL objects (including
                  object versions and delete markers) from the bucket before removing it
                  when this CR is deleted. Without it, deletion of a non-empty bucket is
                  blocked (data-loss guard). The field is mutable, so it can be set right
                  before deleting the CR.

                  It is only honored when the operator is deployed with the wipe feature
                  enabled (Helm value wipeOnDelete.enabled / --enable-wipe-on-delete);
                  otherwise it degrades to the safe empty-only behavior and a warning
                  event is emitted.
                type: boolean
            required:
            - bucketName
            - secretRef
            type: object
          status:
            description: BucketStatus defines the observed state of Bucket.
            properties:
              accessKeyID:
                description: |-
                  AccessKeyID is the S3 access key id provisioned for the workload. The matching
                  secret is only ever stored in the referenced Secret, never in status.
                type: string
              bucketURL:
                description: BucketURL is the path-style S3 endpoint URL of the provisioned
                  bucket.
                type: string
              clone:
                description: |-
                  Clone is the observed state of the spec.cloneFrom operation. It is only
                  set on Buckets that request a clone; once Phase is Completed it is
                  terminal and the clone never runs again.
                properties:
                  bytesCopied:
                    description: |-
                      BytesCopied is the number of bytes transferred so far (from rclone's
                      remote-control stats, refreshed while the clone runs).
                    format: int64
                    type: integer
                  completedAt:
                    description: CompletedAt is when the clone finished successfully.
                    format: date-time
                    type: string
                  eta:
                    description: ETA is rclone's estimated time to completion, e.g.
                      "6m30s".
                    type: string
                  message:
                    description: Message carries a short failure reason while Phase
                      is Failed.
                    type: string
                  phase:
                    description: Phase is the coarse clone lifecycle state.
                    enum:
                    - Running
                    - Completed
                    - Failed
                    type: string
                  progress:
                    description: Progress is a human-readable transfer summary, e.g.
                      "2.0 GiB / 18.0 GiB (11%)".
                    type: string
                  rate:
                    description: Rate is the current transfer rate, e.g. "42.0 MiB/s".
                    type: string
                  startedAt:
                    description: StartedAt is when the first clone job was created.
                    format: date-time
                    type: string
                  totalBytes:
                    description: |-
                      TotalBytes is the total size of the source bucket, measured once before
                      the copy starts so the progress percentage has a stable denominator.
                    format: int64
                    type: integer
                type: object
              conditions:
                description: Conditions represent the latest available observations
                  of the bucket's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              credentialsGroupID:
                description: |-
                  CredentialsGroupID is the StackIT credentials-group id backing this bucket's
                  workload access key.
                type: string
              credentialsGroupURN:
                description: |-
                  CredentialsGroupURN is the credentials-group URN used as the bucket-policy
                  principal for workload isolation (INIT-SETUP.md §4.1).
                type: string
              lastRotationTime:
                description: LastRotationTime is when the last credentials rotation
                  completed.
                format: date-time
                type: string
              lastRotationTrigger:
                description: |-
                  LastRotationTrigger is the rotate-credentials-at annotation value the
                  operator last acted upon. A differing (non-empty) annotation value requests
                  a new rotation; recording it here makes the trigger level-based and
                  GitOps-safe (the operator never mutates the annotation itself).
                type: string
              message:
                description: |-
                  Message is a short, human-readable description of the current reconcile
                  state: the provisioning step in progress, or a concise reason the last
                  attempt failed.
                type: string
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation the operator
                  last reconciled.
                format: int64
                type: integer
              operatorVersion:
                description: OperatorVersion is the version of the operator that last
                  reconciled this Bucket.
                type: string
              phase:
                description: |-
                  Phase is a coarse, human-readable lifecycle summary (Pending, Provisioning,
                  Ready, Failed, Deleting) for at-a-glance display in tools like Lens. The
                  authoritative, machine-readable state stays in Conditions.
                enum:
                - Pending
                - Provisioning
                - Ready
                - Failed
                - Deleting
                type: string
              resolvedBucketName:
                description: |-
                  ResolvedBucketName is the physical StackIT bucket name the operator froze for
                  this CR at first provisioning (spec.bucketName composed with the operator's
                  naming policy). Once set it is authoritative and never recomputed, so a later
                  change to the operator's prefix/namespace policy leaves this bucket untouched.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
