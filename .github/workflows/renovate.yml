name: Renovate Application
on:
  # Run daily at 02:00 UTC
  schedule:
    - cron: '0 2 * * *'
  # After each push to main
  push:
    branches:
      - main
  # Manual trigger
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Renovate log level'
        required: false
        default: 'info'
        type: choice
        options:
          - info
          - debug
          - warn
          - error

permissions:
  contents: read

jobs:
  renovate:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@v46.1.13
        with:
          token: ${{ secrets.BOT_PAT }}
          configurationFile: renovate.json
        env:
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
          RENOVATE_AUTODISCOVER: 'true'
          RENOVATE_AUTODISCOVER_FILTER: 'guided-traffic/stackit-s3-provisioner'
          RENOVATE_REQUIRE_CONFIG: 'required'
