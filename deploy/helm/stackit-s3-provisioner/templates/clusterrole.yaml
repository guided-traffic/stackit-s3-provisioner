apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "stackit-s3-provisioner.fullname" . }}
  labels:
    {{- include "stackit-s3-provisioner.labels" . | nindent 4 }}
rules:
  # Bucket CRD access
  - apiGroups:
      - stackit-bucket.gtrfc.com
    resources:
      - buckets
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - stackit-bucket.gtrfc.com
    resources:
      - buckets/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - stackit-bucket.gtrfc.com
    resources:
      - buckets/finalizers
    verbs:
      - update
  # Workload credential Secrets written by the operator
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  # Events for status reporting (core + events.k8s.io broadcaster API)
  - apiGroups:
      - ""
      - events.k8s.io
    resources:
      - events
    verbs:
      - create
      - patch
  {{- if .Values.leaderElection.enabled }}
  # Leases for leader election
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  {{- end }}
