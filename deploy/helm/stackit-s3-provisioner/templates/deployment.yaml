apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "stackit-s3-provisioner.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "stackit-s3-provisioner.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "stackit-s3-provisioner.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "stackit-s3-provisioner.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "stackit-s3-provisioner.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 10
      containers:
        - name: manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
            {{- if .Values.leaderElection.enabled }}
            - --leader-elect
            {{- end }}
            - --stackit-region={{ .Values.stackit.region }}
            {{- if .Values.stackit.serviceAccountKey.secretName }}
            - --stackit-sa-key-path=/etc/stackit/{{ .Values.stackit.serviceAccountKey.secretKey }}
            {{- end }}
            {{- if .Values.bucketNaming.prefix }}
            - --bucket-name-prefix={{ .Values.bucketNaming.prefix }}
            {{- end }}
            {{- if .Values.bucketNaming.includeNamespace }}
            - --bucket-name-include-namespace
            {{- end }}
            {{- if .Values.ownership.name }}
            - --ownership-name={{ .Values.ownership.name }}
            {{- end }}
            {{- if .Values.wipeOnDelete.enabled }}
            - --enable-wipe-on-delete
            {{- end }}
            - --clone-image={{ .Values.clone.image.repository }}:{{ .Values.clone.image.tag }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- with .Values.clone.resources }}
            - name: CLONE_JOB_RESOURCES
              value: {{ toJson . | quote }}
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- if .Values.stackit.serviceAccountKey.secretName }}
          volumeMounts:
            - name: stackit-sa-key
              mountPath: /etc/stackit
              readOnly: true
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if .Values.stackit.serviceAccountKey.secretName }}
      volumes:
        - name: stackit-sa-key
          secret:
            secretName: {{ .Values.stackit.serviceAccountKey.secretName }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
