# Default values for stackit-s3-provisioner.

# crds controls how the operator's CustomResourceDefinition (Bucket) is shipped.
# The CRD lives in templates/, so it is applied on every install AND upgrade.
# It carries helm.sh/resource-policy: keep, so `helm uninstall` leaves the CRD
# and all existing Bucket resources intact (no finalizer bypass / leaked cloud
# resources); remove it manually with `kubectl delete crd` if truly desired.
crds:
  # install renders the CRD as part of the chart. Set to false when CRDs are
  # managed out-of-band (e.g. GitOps / a separate cluster-admin pipeline).
  install: true

replicaCount: 1

image:
  repository: guidedtraffic/stackit-s3-provisioner
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created.
  create: true
  # Annotations to add to the service account.
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

podAnnotations: {}
podLabels: {}

resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}

# Leader election ensures only one operator instance is active at a time.
# Enable when running more than one replica.
leaderElection:
  enabled: false

# bucketNaming controls how the operator composes the physical StackIT bucket
# name from a Bucket CR. The rule is applied when a bucket is first provisioned
# and then frozen per CR (recorded in status + an annotation): changing prefix or
# includeNamespace later only affects buckets created afterwards; existing buckets
# keep their original name.
#
# Example: prefix "my-cluster" + includeNamespace true turns a Bucket "my-bucket"
# in namespace "monitoring" into the physical bucket "my-cluster-monitoring-my-bucket".
bucketNaming:
  # prefix is prepended to every bucket name (e.g. a cluster identifier). Empty
  # disables the prefix. Must be a lowercase DNS-1123 label (letters, digits, '-';
  # no leading/trailing '-'). The composed name must stay within 63 characters or
  # the Bucket is rejected (Ready=Failed).
  prefix: ""
  # includeNamespace appends the Bucket's namespace to the name after the prefix.
  includeNamespace: false

# ownership controls the marker the operator writes into every provisioned
# bucket's tags to prove it owns them, so it never adopts or deletes a bucket that
# was created elsewhere (collision detection). STACKIT has no native bucket tags,
# so this rides on S3 bucket tagging.
ownership:
  # name is the operator/fleet identity written into each bucket's "managed-by"
  # tag. The operator only adopts or deletes a pre-existing bucket whose managed-by
  # matches this value AND whose "owner" tag matches the Bucket CR's namespace/name.
  #
  # WARNING: this value is part of the bucket ownership key. Changing it after
  # buckets exist makes the operator treat its own buckets as foreign (Ready=Failed
  # collision) until they are re-tagged. On a disaster-recovery restore into a new
  # cluster, set the SAME value so the operator re-adopts its buckets.
  #
  # Run two operators against the same StackIT project only with DISTINCT values
  # (otherwise they fight over the same buckets). Allowed characters follow S3 tag
  # values: letters, digits and + - = . _ : / @ and spaces.
  name: stackit-s3-provisioner

# wipeOnDelete globally gates the destructive wipe feature (spec.wipeOnDelete on
# a Bucket CR: delete ALL objects, including versions and delete markers, before
# removing the bucket on CR deletion). When disabled, a Bucket requesting a wipe
# is degraded to the safe default (delete only if empty) and a warning event is
# emitted — the CR field is effectively ignored.
wipeOnDelete:
  # enabled turns the feature gate on. Opt-in, default off.
  enabled: false

# clone configures the one-shot bucket-clone feature (spec.cloneFrom on a
# Bucket CR: copy the contents of an existing S3 bucket into the freshly
# provisioned one). The copy runs as a Kubernetes Job (rclone) in the
# operator's namespace; the operator polls rclone's remote-control API for
# transfer progress and surfaces it in the Bucket's status.
clone:
  # image is the rclone image run by clone Jobs. Renovate tracks the tag.
  image:
    repository: rclone/rclone
    tag: "1.74.4"
  # resources applied to clone Job pods. Copying is network-bound; raise the
  # limits for very large transfers.
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi
  # networkPolicy restricts ingress to clone Job pods so only the operator can
  # reach the (basic-auth protected) rclone remote-control port. Disable on
  # clusters without a NetworkPolicy-capable CNI, where the resource would be
  # silently ignored anyway.
  networkPolicy:
    enabled: true

# stackit configures the operator's binding to a StackIT project.
stackit:
  # region is the StackIT region the operator provisions buckets in.
  region: eu01
  # serviceAccountKey references an existing Secret holding the StackIT
  # service-account key JSON (key flow, embedded RSA private key).
  # Leave secretName empty to run the operator in skeleton mode (no provisioning).
  serviceAccountKey:
    secretName: ""
    secretKey: sa-key.json
