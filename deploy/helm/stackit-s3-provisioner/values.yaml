# Default values for stackit-s3-provisioner.

# crds controls how the operator's CustomResourceDefinition (Bucket) is shipped.
# The CRD lives in templates/, so it is applied on every install AND upgrade.
# It carries helm.sh/resource-policy: keep, so `helm uninstall` leaves the CRD
# and all existing Bucket resources intact (no finalizer bypass / leaked cloud
# resources); remove it manually with `kubectl delete crd` if truly desired.
crds:
  # install renders the CRD as part of the chart. Set to false when CRDs are
  # managed out-of-band (e.g. GitOps / a separate cluster-admin pipeline).
  install: true

replicaCount: 1

image:
  repository: guidedtraffic/stackit-s3-provisioner
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created.
  create: true
  # Annotations to add to the service account.
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

podAnnotations: {}
podLabels: {}

resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}

# leaderElection ensures only one operator instance reconciles at a time. Keep it
# ON: during a rolling update the new pod starts before the old one terminates,
# and without a single leader BOTH reconcile concurrently — an older version can
# then re-apply a stale bucket policy after the new one wrote the correct one
# (observed: multipart policy fix not reaching an existing bucket after upgrade).
# Once both the outgoing and incoming pods run leader election, the incoming pod
# waits for the lease before it reconciles, so there is no concurrent write — this
# protects every future rollout. NOTE: the ONE rollout that first enables this
# (false->true) still has an outgoing pod that predates leader election and keeps
# reconciling freely, so that single upgrade can still race once; the periodic
# driftResyncInterval below is what heals any stale policy left behind. Enabling
# this also grants the operator the coordination.k8s.io/leases RBAC (clusterrole.yaml).
leaderElection:
  enabled: true

# driftResyncInterval makes the operator periodically re-reconcile every
# provisioned Bucket so configuration drift — most importantly the per-bucket
# isolation policy — self-heals without an event. This matters on operator
# upgrades: the Bucket watch only fires on generation/annotation changes, so a
# policy change shipped in a new version would otherwise not reach
# already-provisioned buckets until their CR is touched. Must be a Go duration
# string WITH A UNIT (e.g. "10m", "1h", "30s"); a bare number like 5 is rejected
# and crash-loops the operator at startup. Set to "0" to disable and rely on
# events only.
driftResyncInterval: "10m"

# bucketNaming controls how the operator composes the physical StackIT bucket
# name from a Bucket CR. The rule is applied when a bucket is first provisioned
# and then frozen per CR (recorded in status + an annotation): changing prefix or
# includeNamespace later only affects buckets created afterwards; existing buckets
# keep their original name.
#
# Example: prefix "my-cluster" + includeNamespace true turns a Bucket "my-bucket"
# in namespace "monitoring" into the physical bucket "my-cluster-monitoring-my-bucket".
bucketNaming:
  # prefix is prepended to every bucket name (e.g. a cluster identifier). Empty
  # disables the prefix. Must be a lowercase DNS-1123 label (letters, digits, '-';
  # no leading/trailing '-'). The composed name must stay within 63 characters or
  # the Bucket is rejected (Ready=Failed).
  prefix: ""
  # includeNamespace appends the Bucket's namespace to the name after the prefix.
  includeNamespace: false

# ownership controls the marker the operator writes into every provisioned
# bucket's tags to prove it owns them, so it never adopts or deletes a bucket that
# was created elsewhere (collision detection). STACKIT has no native bucket tags,
# so this rides on S3 bucket tagging.
ownership:
  # name is the operator/fleet identity written into each bucket's "managed-by"
  # tag. The operator only adopts or deletes a pre-existing bucket whose managed-by
  # matches this value AND whose "owner" tag matches the Bucket CR's namespace/name.
  #
  # WARNING: this value is part of the bucket ownership key. Changing it after
  # buckets exist makes the operator treat its own buckets as foreign (Ready=Failed
  # collision) until they are re-tagged. On a disaster-recovery restore into a new
  # cluster, set the SAME value so the operator re-adopts its buckets.
  #
  # Run two operators against the same StackIT project only with DISTINCT values
  # (otherwise they fight over the same buckets). Allowed characters follow S3 tag
  # values: letters, digits and + - = . _ : / @ and spaces.
  name: stackit-s3-provisioner

# wipeOnDelete globally gates the destructive wipe feature (spec.wipeOnDelete on
# a Bucket CR: delete ALL objects, including versions and delete markers, before
# removing the bucket on CR deletion). When disabled, a Bucket requesting a wipe
# is degraded to the safe default (delete only if empty) and a warning event is
# emitted — the CR field is effectively ignored.
wipeOnDelete:
  # enabled turns the feature gate on. Opt-in, default off.
  enabled: false

# clone configures the one-shot bucket-clone feature (spec.cloneFrom on a
# Bucket CR: copy the contents of an existing S3 bucket into the freshly
# provisioned one). The copy runs as a Kubernetes Job (rclone) in the
# operator's namespace; the operator polls rclone's remote-control API for
# transfer progress and surfaces it in the Bucket's status.
clone:
  # image is the rclone image run by clone Jobs. Renovate tracks the tag.
  image:
    repository: rclone/rclone
    tag: "1.74.4"
  # resources applied to clone Job pods. Copying is network-bound; raise the
  # limits for very large transfers.
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi
  # networkPolicy restricts ingress to clone Job pods so only the operator can
  # reach the (basic-auth protected) rclone remote-control port. Disable on
  # clusters without a NetworkPolicy-capable CNI, where the resource would be
  # silently ignored anyway.
  networkPolicy:
    enabled: true

# monitoring integrates the operator with a prometheus-operator stack. Both
# resources below use prometheus-operator CRDs (monitoring.coreos.com/v1) —
# enable them only on clusters where those CRDs exist, or the install fails.
monitoring:
  # serviceMonitor scrapes the operator's metrics endpoint (:8080). Enabling it
  # also renders the metrics Service the ServiceMonitor selects.
  serviceMonitor:
    enabled: false
    # interval between scrapes (Prometheus duration).
    interval: 30s
    # scrapeTimeout per scrape; empty uses the Prometheus default.
    scrapeTimeout: ""
    # labels are added to the ServiceMonitor, e.g. the `release: <name>` label
    # many kube-prometheus-stack installs require for discovery.
    labels: {}
  # prometheusRule ships the operator's alerting rules. Every alert can be
  # switched off individually; all alerts default to enabled. The resource is
  # only rendered when enabled is true AND at least one alert is enabled.
  prometheusRule:
    enabled: false
    # labels are added to the PrometheusRule, e.g. `release: <name>`.
    labels: {}
    alerts:
      # bucketsWipeOnDelete fires (warning) while at least one Bucket CR
      # carries spec.wipeOnDelete=true — deleting such a CR irreversibly
      # wipes all objects in its bucket.
      bucketsWipeOnDelete:
        enabled: true
      # bucketFailed fires (warning) while any Bucket is in phase Failed.
      # Config faults deliberately park without requeue-hammering, so without
      # this alert nobody notices them.
      bucketFailed:
        enabled: true
      # bucketStuckProvisioning fires (warning) when Buckets sit in phase
      # Pending/Provisioning for 30m (StackIT API down, quota, network).
      bucketStuckProvisioning:
        enabled: true
      # bucketStuckDeleting fires (warning) when a finalizer teardown hangs for
      # 30m — usually the non-empty-bucket data-loss guard blocking deletion.
      bucketStuckDeleting:
        enabled: true
      # cloneFailed fires (warning) when a bucket clone stays Failed for 30m
      # (dead source credentials, vanished source bucket).
      cloneFailed:
        enabled: true
      # skeletonMode fires (critical) while the operator runs without a StackIT
      # service-account key: probes stay green but nothing is provisioned.
      skeletonMode:
        enabled: true
      # wipeRequestedButGateDisabled fires (warning) when Buckets request
      # spec.wipeOnDelete but the operator-wide feature gate is off — deletion
      # would silently degrade to the empty-only guard.
      wipeRequestedButGateDisabled:
        enabled: true
      # reconcileErrors fires (warning) on more than 3 reconcile errors within
      # 15m (controller-runtime's built-in error counter).
      reconcileErrors:
        enabled: true

# stackit configures the operator's binding to a StackIT project.
stackit:
  # region is the StackIT region the operator provisions buckets in.
  region: eu01
  # serviceAccountKey references an existing Secret holding the StackIT
  # service-account key JSON (key flow, embedded RSA private key).
  # Leave secretName empty to run the operator in skeleton mode (no provisioning).
  serviceAccountKey:
    secretName: ""
    secretKey: sa-key.json
